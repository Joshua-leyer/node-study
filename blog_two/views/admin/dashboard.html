<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css" integrity="sha384-HSMxcRTRxnN+Bdg0JdbxYKrThecOKuH5zCYotlSAcp1+c8xmyTe9GYg1l9a69psu" crossorigin="anonymous">
    <script src="https://cdn.bootcdn.net/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <!-- 最新的 Bootstrap 核心 JavaScript 文件 -->
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/3.4.1/js/bootstrap.min.js" integrity="sha384-aJ21OjlMXNL5UyIl/XNwTMqvzeRMZH2w8c5cRVpzpU8Y5bApTppSuUkhZXN0VxHd" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="/myCss/dashboard.css">
</head>
<body>

    <header>文章管理页面</header>
    
    <div id="content">
        <div class="option">
            <h3 class="back-bome"><a href="/">< home</a></h3>
            <div id="add">
                <button type="button" class="btn btn-success"> <a href="/admin/add">Add</a> </button>
            </div>
        </div>

    
        <table class="table my-table">
            <thead >
                <tr>
                  <th>#</th>
                  <th>标题</th>
                  <th>created</th>
                  <th>Options</th>
                </tr>
            </thead>
    
            <tbody>
 

                {{each doc value index}}
                <tr>
                    <td>{{index + 1}}</td>
                    <td>{{value.tittle}}</td>
                    <td>{{value.created}}</td>
                    <td>
                        <button type="button" class="btn btn-info"> <a href="edit/{{ value._id.toString() }}">Info</a></button>
                        <button type="button" class="btn btn-warning"> <a href="delete/{{ value._id.toString() }}">Delete</a> </button>
                    </td>
                </tr>
                {{/each}}

            </tbody>
        </table>

        <nav aria-label="Page navigation">
            <ul class="pagination">
              <li style="display: {{ page-0-1 < 1 ? 'none' : 'inline' }}">
                <a href="/admin/dashboard?page={{page-0 - 1}}" aria-label="Previous">
                  <span aria-hidden="true">&laquo;</span>
                </a>
              </li>
                <% for (let i = 1; i <= total; i++) { %>
                    <li><a href="/admin/dashboard?page={{i}}">{{i}}</a></li>
                <% } %>
              <li style="display: {{ page-0+1 > total ? 'none' : 'inline' }}">
                <a href="/admin/dashboard?page={{page-0 + 1}}" aria-label="Next">
                  <span aria-hidden="true">&raquo;</span>
                </a>
              </li>
            </ul>
        </nav>

    </div>


</body>
</html>
